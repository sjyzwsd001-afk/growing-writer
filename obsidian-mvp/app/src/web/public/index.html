<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>写作助手控制台</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">GW</div>
          <div>
            <div class="eyebrow">Obsidian MVP</div>
            <h1>写作助手控制台</h1>
          </div>
        </div>
        <div class="status-card">
          <div class="status-row">
            <span>模型接入</span>
            <strong id="llm-status">检查中</strong>
          </div>
          <div class="status-row">
            <span>Vault</span>
            <code id="vault-root">-</code>
          </div>
        </div>
        <button id="reload-dashboard" class="ghost-button" type="button">刷新全局数据</button>
        <button id="refresh-tasks" class="ghost-button" type="button">刷新任务参考依据</button>
        <button id="refresh-profile" class="ghost-button" type="button">刷新写作画像</button>
        <div class="help-card">
          <h2>适合你的用法</h2>
          <p>先导入历史材料，再选择任务跑诊断、提纲、初稿。规则和反馈也能在这里直接处理。</p>
        </div>
      </aside>

      <main class="content-grid">
        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Step 1</div>
              <h2>导入材料</h2>
            </div>
          </div>
          <form id="material-form" class="form-grid">
            <label>
              <span>标题</span>
              <input name="title" placeholder="例如：某项目周报样稿" required />
            </label>
            <label>
              <span>文档类型</span>
              <input name="docType" placeholder="例如：工作汇报" required />
            </label>
            <label>
              <span>面向对象</span>
              <input name="audience" placeholder="例如：领导" />
            </label>
            <label>
              <span>使用场景</span>
              <input name="scenario" placeholder="例如：月度汇报" />
            </label>
            <label>
              <span>来源说明</span>
              <input name="source" placeholder="例如：个人旧稿" />
            </label>
            <label>
              <span>质量标签</span>
              <select name="quality">
                <option value="high">high</option>
                <option value="medium">medium</option>
                <option value="low">low</option>
              </select>
            </label>
            <label class="field-span">
              <span>浏览器上传文件（推荐，支持 txt/md/docx/pdf）</span>
              <input name="uploadFile" type="file" accept=".txt,.md,.docx,.pdf" />
            </label>
            <label class="field-span">
              <span>本地文件路径（可选，支持 txt/md/docx/pdf）</span>
              <input name="sourceFile" placeholder="/Users/zw/Documents/raw/example.docx" />
            </label>
            <label class="field-span">
              <span>正文内容（和文件路径二选一即可）</span>
              <textarea name="body" rows="8" placeholder="把历史材料粘贴到这里"></textarea>
            </label>
            <div class="field-span">
              <button class="primary-button" type="submit">导入材料</button>
            </div>
          </form>
        </section>

        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Step 2</div>
              <h2>新建任务</h2>
            </div>
          </div>
          <form id="task-form" class="form-grid">
            <label>
              <span>任务标题</span>
              <input name="title" placeholder="例如：联调阶段风险汇报" required />
            </label>
            <label>
              <span>文档类型</span>
              <input name="docType" placeholder="例如：风险汇报" required />
            </label>
            <label>
              <span>面向对象</span>
              <input name="audience" placeholder="例如：领导" />
            </label>
            <label>
              <span>使用场景</span>
              <input name="scenario" placeholder="例如：项目阶段汇报" />
            </label>
            <label>
              <span>优先级</span>
              <select name="priority">
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="low">low</option>
              </select>
            </label>
            <label>
              <span>目标字数</span>
              <input name="targetLength" placeholder="例如：1200" />
            </label>
            <label>
              <span>截止日期</span>
              <input name="deadline" placeholder="例如：2026-03-20" />
            </label>
            <label>
              <span>写作目标</span>
              <input name="goal" placeholder="这次要写什么" />
            </label>
            <label class="field-span">
              <span>希望达到的效果</span>
              <input name="targetEffect" placeholder="例如：让领导快速掌握风险并协调资源" />
            </label>
            <label class="field-span">
              <span>背景（每行一条）</span>
              <textarea name="background" rows="4" placeholder="项目已进入联调阶段"></textarea>
            </label>
            <label class="field-span">
              <span>事实与数据（每行一条）</span>
              <textarea name="facts" rows="5" placeholder="接口稳定性存在波动"></textarea>
            </label>
            <label class="field-span">
              <span>必须包含的信息（每行一条）</span>
              <textarea name="mustInclude" rows="4" placeholder="风险点&#10;影响&#10;措施"></textarea>
            </label>
            <label class="field-span">
              <span>特殊要求（每行一条）</span>
              <textarea name="specialRequirements" rows="4" placeholder="语气正式&#10;结构清晰"></textarea>
            </label>
            <fieldset class="field-span materials-selector">
              <legend>关联历史材料</legend>
              <div id="task-material-options" class="checkbox-grid"></div>
            </fieldset>
            <div class="field-span">
              <button class="primary-button" type="submit">新建任务</button>
            </div>
          </form>
        </section>

        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Step 3</div>
              <h2>新建反馈</h2>
            </div>
          </div>
          <form id="feedback-form" class="form-grid">
            <label>
              <span>关联任务</span>
              <select name="taskId" id="feedback-task-options">
                <option value="">不关联任务</option>
              </select>
            </label>
            <label>
              <span>反馈类型</span>
              <select name="feedbackType">
                <option value="">先留空</option>
                <option value="wording">wording</option>
                <option value="structure">structure</option>
                <option value="order">order</option>
                <option value="logic">logic</option>
                <option value="missing_info">missing_info</option>
                <option value="scenario_mismatch">scenario_mismatch</option>
                <option value="factual_fix">factual_fix</option>
              </select>
            </label>
            <label>
              <span>严重程度</span>
              <select name="severity">
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="low">low</option>
              </select>
            </label>
            <label>
              <span>动作</span>
              <select name="action">
                <option value="review">review</option>
                <option value="rewrite">rewrite</option>
                <option value="archive">archive</option>
              </select>
            </label>
            <label class="field-span">
              <span>原始反馈</span>
              <textarea name="rawFeedback" rows="6" placeholder="例如：这一段太虚了，必须把影响范围写具体。"></textarea>
            </label>
            <label>
              <span>影响段落</span>
              <input name="affectedParagraph" placeholder="例如：主体分析段" />
            </label>
            <label>
              <span>影响章节</span>
              <input name="affectedSection" placeholder="例如：主体内容" />
            </label>
            <label>
              <span>影响整体结构</span>
              <select name="affectsStructure">
                <option value="">留空</option>
                <option value="否">否</option>
                <option value="是">是</option>
              </select>
            </label>
            <div class="field-span">
              <button class="primary-button" type="submit">新建反馈</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Materials</div>
              <h2>材料库</h2>
            </div>
            <span class="panel-count" id="materials-count">0</span>
          </div>
          <div id="materials-list" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Tasks</div>
              <h2>任务</h2>
            </div>
            <span class="panel-count" id="tasks-count">0</span>
          </div>
          <div id="tasks-list" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Rules</div>
              <h2>规则库</h2>
            </div>
            <span class="panel-count" id="rules-count">0</span>
          </div>
          <div id="rules-list" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Profiles</div>
              <h2>写作画像</h2>
            </div>
            <span class="panel-count" id="profiles-count">0</span>
          </div>
          <div id="profiles-list" class="list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Feedback</div>
              <h2>反馈记录</h2>
            </div>
            <span class="panel-count" id="feedback-count">0</span>
          </div>
          <div id="feedback-list" class="list"></div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-header">
            <div>
              <div class="eyebrow">Preview</div>
              <h2>文件预览 / 运行结果</h2>
            </div>
          </div>
          <div id="result-viewer" class="result-viewer">加载后会在这里显示文件内容或操作结果。</div>
        </section>
      </main>
    </div>
    <script type="module" src="/assets/app.js"></script>
  </body>
  </html>
